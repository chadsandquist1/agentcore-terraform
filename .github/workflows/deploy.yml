name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION:     "1.10.5"
  AWS_REGION:     "us-east-1"
  PYTHON_VERSION: "3.12"
  NODE_VERSION:   "20"

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  build:
    name: Build Artifacts
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Generate lock file
        run: uv lock --check

      - name: Build Lambda layer, AgentCore agent, and API handler
        run: make build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/lambda_layer.zip
            build/agent.zip
            build/api_handler.zip
          retention-days: 1

  terraform-plan:
    name: Terraform Plan
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan

      - name: Get Plan Output
        id: plan_output
        run: |
          PLAN_TEXT=$(terraform show -no-color tfplan 2>&1)
          echo "plan_text<<PLAN_EOF" >> "$GITHUB_OUTPUT"
          echo "${PLAN_TEXT:0:65000}" >> "$GITHUB_OUTPUT"
          echo "PLAN_EOF" >> "$GITHUB_OUTPUT"

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments.filter(c =>
              c.user.type === 'Bot' && c.body.includes('Terraform Plan Results'))) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: c.id,
              });
            }
            const icon = o => o === 'success' ? '✅' : '❌';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Terraform Plan Results
            | Step | Status |
            |------|--------|
            | Format | ${icon('${{ steps.fmt.outcome }}')} \`${{ steps.fmt.outcome }}\` |
            | Validate | ${icon('${{ steps.validate.outcome }}')} \`${{ steps.validate.outcome }}\` |
            | Plan | ${icon('${{ steps.plan.outcome }}')} \`${{ steps.plan.outcome }}\` |

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${{ steps.plan_output.outputs.plan_text }}
            \`\`\`
            </details>

            *Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`,
            });

  terraform-apply:
    name: Terraform Apply
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      api_url:        ${{ steps.outputs.outputs.api_url }}
      cognito_client: ${{ steps.outputs.outputs.cognito_client }}
      cf_bucket:      ${{ steps.outputs.outputs.cf_bucket }}
      cf_dist_id:     ${{ steps.outputs.outputs.cf_dist_id }}
      cf_url:         ${{ steps.outputs.outputs.cf_url }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform plan -input=false -out=tfplan && terraform apply -auto-approve -input=false tfplan

      - name: Capture Terraform outputs
        id: outputs
        run: |
          echo "api_url=$(terraform output -raw api_url)"         >> "$GITHUB_OUTPUT"
          echo "cognito_client=$(terraform output -raw cognito_client_id)" >> "$GITHUB_OUTPUT"
          echo "cf_bucket=$(terraform output -raw frontend_bucket)"       >> "$GITHUB_OUTPUT"
          echo "cf_dist_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "cf_url=$(terraform output -raw cloudfront_url)"           >> "$GITHUB_OUTPUT"

  deploy-frontend:
    name: Deploy Frontend
    needs: terraform-apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write env file
        run: |
          cat > frontend/.env.production <<EOF
          VITE_API_URL=${{ needs.terraform-apply.outputs.api_url }}
          VITE_COGNITO_USER_POOL_ID=us-east-1_jCtPXwqXV
          VITE_COGNITO_CLIENT_ID=${{ needs.terraform-apply.outputs.cognito_client }}
          EOF

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Sync to S3
        run: aws s3 sync frontend/dist/ s3://${{ needs.terraform-apply.outputs.cf_bucket }}/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.terraform-apply.outputs.cf_dist_id }} \
            --paths "/*"
          echo "Frontend live at: ${{ needs.terraform-apply.outputs.cf_url }}"
