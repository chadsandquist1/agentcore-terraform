name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION: "1.10.5"
  AWS_REGION: "us-east-1"
  PYTHON_VERSION: "3.12"

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  build:
    name: Build Artifacts
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Generate lock file
        run: uv lock --check

      - name: Build Lambda layer and AgentCore agent
        run: make build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/lambda_layer.zip
            build/agent.zip
          retention-days: 1

  terraform-plan:
    name: Terraform Plan
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan

      - name: Get Plan Output
        id: plan_output
        run: |
          PLAN_TEXT=$(terraform show -no-color tfplan 2>&1)
          echo "plan_text<<PLAN_EOF" >> "$GITHUB_OUTPUT"
          echo "${PLAN_TEXT:0:65000}" >> "$GITHUB_OUTPUT"
          echo "PLAN_EOF" >> "$GITHUB_OUTPUT"

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments.filter(c =>
              c.user.type === 'Bot' && c.body.includes('Terraform Plan Results'))) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: c.id,
              });
            }
            const icon = o => o === 'success' ? '✅' : '❌';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Terraform Plan Results
            | Step | Status |
            |------|--------|
            | Format | ${icon('${{ steps.fmt.outcome }}')} \`${{ steps.fmt.outcome }}\` |
            | Validate | ${icon('${{ steps.validate.outcome }}')} \`${{ steps.validate.outcome }}\` |
            | Plan | ${icon('${{ steps.plan.outcome }}')} \`${{ steps.plan.outcome }}\` |

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${{ steps.plan_output.outputs.plan_text }}
            \`\`\`
            </details>

            *Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`,
            });

  terraform-apply:
    name: Terraform Apply
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform plan -input=false -out=tfplan && terraform apply -auto-approve -input=false tfplan
